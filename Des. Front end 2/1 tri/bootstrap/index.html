<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="max-width: 400px; width: 100%; border-radius: 15px;">
      <div class="text-center">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Pix_%28Brazil%29_logo.svg/3840px-Pix_%28Brazil%29_logo.svg.png" alt="e o pix nada ainda?" class="rounded-circule mb-3" style="width: 160px; height: 60px;">
        <h3 class="fw-bold">Bem-vindo</h3>
        <p class="text-muted mt-2">Entre em sua conta</p>

      </div>
    <form action="">
      <div class="mb-3">
        <label for="" class="form-label">Úsuarios:</label>
        <input type="text" class="form-control p-3">
      </div>
      <div class="mb-3">
        <label for="" class="form-label">Senha:</label>
        <input type="password" class="form-control p-3">
      </div>
      <button type="submit" class="btn btn-primary w-100 p-3">ENTRAR</button>
    </form>
      <div class="mt-3 text-center">
        <a href="" class="text-decoration-none">Esqueceu a senha? Burro</a>
      </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
